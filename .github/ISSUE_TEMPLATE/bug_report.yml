name: 🐛 Bug Report
description: File a structured bug report to help us improve CommitLabs.
title: "[Bug]: "
labels: ["type-bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Before submitting, please ensure you have read the [Developer Guide](https://github.com/Commitlabs-Org/Commitlabs-Frontend/blob/master/DEVELOPER_GUIDE.md).
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what is broken, what happens, and what should happen.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide detailed steps to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: Describe the expected behavior.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment & Tools
      description: Mention browser, OS, Stellar wallet (e.g. Freighter), Node.js version, or any other relevant environmental details.
      placeholder: |
        - OS: [e.g. Windows, macOS]
        - Browser: [e.g. Chrome, Firefox]
        - Wallet: [e.g. Freighter v1.6.0]
        - Node.js Version: [e.g. v18.x]
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the problem here.
      placeholder: Drag and drop screenshots or add logs here.
    validations:
      required: false
  - type: checkboxes
    id: campaign-checklist
    attributes:
      label: Contributor & Campaign Agreement
      description: Please review and check the following requirements before submitting.
      options:
        - label: I have reviewed the [Developer Guide](https://github.com/Commitlabs-Org/Commitlabs-Frontend/blob/master/DEVELOPER_GUIDE.md) and will adhere to the project's coding/styling standards.
          required: true
        - label: I agree to deliver the changes within the campaign's 96-hour timeframe if assigned.
          required: true
        - label: I understand that any new or modified logic requires a minimum of 95% test coverage.
          required: true
